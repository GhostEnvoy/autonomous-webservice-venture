<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Problem Signal</title>
    <style>
      body { font-family: ui-sans-serif, system-ui, sans-serif; margin: 2rem auto; max-width: 760px; padding: 0 1rem; }
      h1 { margin-bottom: 0.5rem; }
      p { color: #444; }
      form { display: grid; gap: 0.75rem; margin-top: 1rem; }
      input, textarea, button { padding: 0.65rem 0.75rem; font-size: 1rem; }
      textarea { min-height: 120px; }
      button { cursor: pointer; }
      .ok { color: #0a7a33; }
      .err { color: #a40000; }
    </style>
  </head>
  <body>
    <h1>Problem Signal</h1>
    <p>Tell us your painful workflow. We are building a focused webservice around real demand.</p>
    <form id="f">
      <input name="email" type="email" placeholder="Email" required />
      <input name="use_case" placeholder="Use case (e.g. freelance lead tracking)" required />
      <textarea name="pain" placeholder="What is frustrating today?" required></textarea>
      <input name="willingness_to_pay" placeholder="How much would this be worth per month? (optional)" />
      <button type="submit">Submit</button>
    </form>
    <p id="msg"></p>
    <script>
      const f = document.getElementById('f');
      const msg = document.getElementById('msg');
      f.addEventListener('submit', async (e) => {
        e.preventDefault();
        msg.textContent = 'Submitting...';
        msg.className = '';
        const data = Object.fromEntries(new FormData(f).entries());
        const r = await fetch('/api/submit', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(data),
        });
        const j = await r.json().catch(() => ({}));
        if (!r.ok || !j.ok) {
          msg.textContent = `Failed: ${j.error || r.status}`;
          msg.className = 'err';
          return;
        }
        msg.textContent = 'Thanks. Your signal was recorded.';
        msg.className = 'ok';
        f.reset();
      });
    </script>
  </body>
</html>
